<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Parcel Beside U</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .admin-container {
      background: var(--bg-main);
      border: 1px solid var(--divider);
      border-radius: 8px;
      padding: 32px;
      margin-top: 24px;
    }
    .input-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 16px;
    }
    textarea, input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--divider);
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    button.btn {
      background: #111827;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button.btn:hover {
      background: #1f2937;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  
  <header>
    <div class="header-container">
      <a href="index.html" class="logo">
        📦 Parcel beside U (Admin)
      </a>
      <button class="hamburger">☰</button>
      <nav class="nav-links">
        <a href="index.html">Back to Site</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="page-title">Admin Dashboard (새로고침 완료!)</h1>
    
    <!-- Login Section -->
    <div id="login-section" class="admin-container">
      <h2>Please Login</h2>
      <form id="login-form" onsubmit="return handleAdminLogin(event)">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="admin-email" placeholder="admin@example.com" required />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="admin-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn" id="login-btn">Login</button>
      </form>
      <p id="login-error" style="color: red; margin-top: 12px; font-weight: bold;"></p>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="admin-container hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>Edit Site Information</h2>
        <button class="btn" id="logout-btn" style="background: var(--divider); color: var(--text-main);">Logout</button>
      </div>
      
      <div class="input-group">
        <label>⏰ Business Hours (Use bullet points or plain text)</label>
        <textarea id="edit-hours" placeholder="Loading..."></textarea>
      </div>

      <div class="input-group">
        <label>💳 Payment Method</label>
        <textarea id="edit-payment" placeholder="Loading..."></textarea>
      </div>

      <button class="btn" id="save-btn">Save Changes</button>
      <p id="save-status" style="color: green; margin-top: 12px; font-weight: bold;"></p>
    </div>

  </main>

  <script>
    window.handleAdminLogin = async function(e) {
      if (e) e.preventDefault();
      
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;
      const errorMsg = document.getElementById('login-error');
      
      const loginSection = document.getElementById('login-section');
      const dashboardSection = document.getElementById('dashboard-section');

      if (!window.supabase) {
        errorMsg.style.color = 'red';
        errorMsg.innerText = '인터넷 접속 문제로 라이브러리가 로드되지 않았습니다. 잠시 후 다시 시도해주세요.';
        return false;
      }
      
      errorMsg.style.color = '#eab308';
      errorMsg.innerText = '로그인 중입니다. 잠시만 기다려주세요...';

      try {
        const SUPABASE_URL = 'https://ankpcatdvcumwdjwptvp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFua3BjYXRkdmN1bXdkandwdHZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODUwNjgsImV4cCI6MjA5MTg2MTA2OH0.lFN2Lov4Wp6gWLeXIIpcViz8Yv-V5i-iR0sLyJiAros';
        window.tempSb = window.tempSb || window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const { data, error } = await window.tempSb.auth.signInWithPassword({ email: email, password: password });

        if (error) {
          errorMsg.style.color = 'red';
          errorMsg.innerText = '로그인 실패: ' + error.message;
        } else {
          errorMsg.innerText = '로그인 성공!';
          loginSection.classList.add('hidden');
          dashboardSection.classList.remove('hidden');
          
          // Fetch settings immediately
          const { data: sData } = await window.tempSb.from('site_settings').select('*');
          if (sData) {
            sData.forEach(item => {
              if (item.id === 'business_hours') document.getElementById('edit-hours').value = item.content;
              if (item.id === 'payment_method') document.getElementById('edit-payment').value = item.content;
            });
          }
        }
      } catch (err) {
        errorMsg.style.color = 'red';
        errorMsg.innerText = '오류 발생: ' + err.message;
      }
      return false;
    };
  </script>
  <script src="app.js?v=final_fix"></script>
</body>
</html>
